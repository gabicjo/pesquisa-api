<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ola, mundo!</h1>
    <script>
        fetch("http://localhost:5000/enviar_dados", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nome: "Gabriel",
                idade: 17
            })
        })
        .then(res => res.json())
        .then(data => console.log(data))
    </script>
</body>
</html>
